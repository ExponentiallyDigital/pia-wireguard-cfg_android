name: Package Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "false"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SET UP JAVA
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 2. SET UP FLUTTER
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 3. DECODE KEYSTORE
      # Decodes the base64-encoded JKS stored in KEYSTORE_BASE64 and writes it
      # to android/release.jks, then creates android/key.properties so
      # build.gradle.kts can find it.  All four secrets must be set in the
      # repository Settings -> Secrets and variables -> Actions page:
      #   KEYSTORE_BASE64    -- base64 -i release.jks | pbcopy
      #   KEYSTORE_PASSWORD  -- storePassword
      #   KEY_ALIAS          -- keyAlias  (e.g. pia-wireguard)
      #   KEY_PASSWORD       -- keyPassword
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/release.jks
          cat > android/key.properties <<EOF
          storeFile=../release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 4. GET DEPENDENCIES & BUILD THE APK
      - name: Build Flutter APK
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release

      # 5. INSTALL PANDOC
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # 6. CREATE STAGING DIRECTORY & GENERATE HTML
      - name: Create addon directory and assets
        run: |
          ADDON="${{ github.event.repository.name }}"
          mkdir -p build/$ADDON

          pandoc README.md -f gfm -t html -s --self-contained -o build/$ADDON/README.html

          cp LICENSE build/$ADDON/
          cp README.md build/$ADDON/

          cp build/app/outputs/flutter-apk/app-release.apk build/$ADDON/pia-wireguard-cfga.apk
          cp build/app/outputs/flutter-apk/app-release.apk.sha1 build/$ADDON/pia-wireguard-cfga.sha1

      # 7. CREATE ZIP ARCHIVE
      - name: Create ZIP
        run: |
          ADDON="${{ github.event.repository.name }}"
          cd build
          zip -r "$ADDON-${GITHUB_REF_NAME}.zip" "$ADDON"

      # 8. DRY RUN NOTICE
      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      # 9. UPLOAD TO GITHUB RELEASES
      - name: Upload Release Asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ github.event.repository.name }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
